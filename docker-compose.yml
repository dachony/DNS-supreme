services:
  dns-supreme:
    build: .
    container_name: dns-supreme
    ports:
      - "53:53/udp"             # DNS UDP
      - "53:53/tcp"             # DNS TCP
      - "853:853/tcp"           # DNS-over-TLS
      - "853:853/udp"           # DNS-over-QUIC (RFC 9250)
      - "80:80"                 # Block page HTTP
      - "443:443"               # Block page HTTPS + DoH (/dns-query)
      - "5380:5380"             # Management panel
    environment:
      - DNS_LISTEN_ADDR=0.0.0.0
      - DNS_PORT=53
      - DNS_FORWARDERS=8.8.8.8:53,1.1.1.1:53
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=dnsupreme
      - DB_PASSWORD=dnsupreme
      - DB_NAME=dnsupreme
      - API_PORT=5380
      - BLOCKPAGE_HTTP_PORT=80
      - BLOCKPAGE_HTTPS_PORT=443
      - BLOCK_PAGE_IP=${BLOCK_PAGE_IP:-}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - geoipdata:/app/data
      - certdata:/app/certs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dns-net

  postgres:
    image: postgres:16-alpine
    container_name: dns-supreme-db
    environment:
      - POSTGRES_USER=dnsupreme
      - POSTGRES_PASSWORD=dnsupreme
      - POSTGRES_DB=dnsupreme
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnsupreme"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - dns-net

volumes:
  pgdata:
  geoipdata:
  certdata:

networks:
  dns-net:
    driver: bridge
