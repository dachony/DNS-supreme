services:
  dns-supreme:
    build: .
    container_name: dns-supreme
    ports:
      - "53535:53/udp"        # DNS UDP
      - "53535:53/tcp"        # DNS TCP
      - "8530:853/tcp"        # DoT
      - "8553:8443/tcp"       # DoH
      - "8853:8853/udp"       # DoQ
      - "8880:80"             # Block page HTTP  (prod: 80:80)
      - "4443:443"            # Block page HTTPS (prod: 443:443)
      - "5380:5380"           # Management panel
    environment:
      - DNS_LISTEN_ADDR=0.0.0.0
      - DNS_PORT=53
      - DNS_FORWARDERS=8.8.8.8:53,1.1.1.1:53
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=dnsupreme
      - DB_PASSWORD=dnsupreme
      - DB_NAME=dnsupreme
      - API_PORT=5380
      - BLOCKPAGE_HTTP_PORT=80
      - BLOCKPAGE_HTTPS_PORT=443
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dns-net

  postgres:
    image: postgres:16-alpine
    container_name: dns-supreme-db
    environment:
      - POSTGRES_USER=dnsupreme
      - POSTGRES_PASSWORD=dnsupreme
      - POSTGRES_DB=dnsupreme
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnsupreme"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - dns-net

volumes:
  pgdata:

networks:
  dns-net:
    driver: bridge
